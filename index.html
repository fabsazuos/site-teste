<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice Catarina</title>
    <style>
        body {
            background: url("./assets/imgs/IMG-20250726-WA0024.jpg") center center fixed;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            color: white;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }

        .galeria {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .galeria img {
            width: 100%;
            height: 300px; 
            object-fit: cover; 
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        #instaLice {
            position: fixed;
            right: 20px;
            bottom: 35px;
            background: #d965e9;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            z-index: 9999;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        
        @media (max-width: 768px) {
            .galeria {
                grid-template-columns: repeat(2, 1fr); 
                padding: 10px;
            }
            
            h1 {
                font-size: 1.5rem;
            }

            #instaLice {
                padding: 10px 20px;
                font-size: 14px;
            }
        }

        
        @media (max-width: 480px) {
            .galeria {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    </a>
